    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <script>
    function playGame() {
        const CHOICES= ["rock", "paper", "scissors"]; //array [0][1][2] is used to store options, Will be able to add new options later.
        const ROUNDS=5;
        
        let humanScore = 0;
        let computerScore = 0;
        
        //getComputerChoice
        function getComputerChoice(){
            const randomIndex= Math.floor(Math.random()*CHOICES.length); //length: 3, so range is 0-2.999...which is then rounded down by Math.floor
            return CHOICES[randomIndex]; //outputs 1 element from array with the value generated from randomIndex(0,1,2)
        //if randomIndex=CHOICES.length -> undefined bc that index does not exist, thats y Math.floor() is needed.    
        }
        
        // getHumanChoice
        function getHumanChoice(){
            while (true) {          //infinite loop, only stops by 'break'/'return'/ user cancels / invalid input
                const input = prompt("Please select your move"); //prompt

                if (input === null) return null; //handles safely if user cancels prompt. 
                                                // without this line, next line "input.toLowerCase()" would crash
                const userInput = input.toLowerCase().trim(); // lowercase & removes spaces front & back

                if (CHOICES.includes(userInput)){   //checks if input valid. includes() checks if userInput is one of values in CHOICES
                    return userInput;
                }
                alert("Invalid Option!!!")
                //Loops back to top due to "while(true)"
            }
        }
        

        //playRound -> take player & comp moves, determine winner of rounds, update correct scores, print result
        function playRound(humanChoice, computerChoice){
            //convert choices into index positions.
            const humanIndex= CHOICES.indexOf(humanChoice);
            const computerIndex=CHOICES.indexOf(computerChoice);

            //safety guard. indexOf() returns -1 if value not found. eg, enter wrong word.
            //not necessary bc this program already validates input before calling playRound. But still good defensive coding?in case bug from later changes.
            if (humanIndex === -1 || computerIndex === -1){
                console.log("Invalid choice.");
                return;
            }
            //tie check
            if (humanChoice === computerChoice){
                console.log(`Tie! Both chose ${humanChoice}.`);
                return;
            } 
            
            //Winner math.
            const result = (humanIndex - computerIndex + CHOICES.length) % CHOICES.length;
            //eg, humanIndex = 1, computerIndex = 0
            //(1-0+3)%3 = 4%3 = 1 -> human wins. Winning case always = 1. 
            //this logic only works on exact order of CHOICES

            if (result===1){
                humanScore++;
                console.log(`You win! ${humanChoice} beats ${computerChoice}.`);
            } else {
                computerScore++;
                console.log(`You lost! ${computerChoice} beats ${humanChoice}.`);
            }
            console.log(`Score: You: ${humanScore} | Computer: ${computerScore}`);
        }
        
        //5rounds. Main game loop. 
        for (let i = 1; i<=ROUNDS; i++){ //repeat block for each round. start at round 1. loops ends at ROUNDS=5
            console.log(`Round ${i}`); 

            const humanChoice=getHumanChoice(); //calls getHumanChoice() function. Then, humanChoice stores the player's move.

            if (humanChoice===null){ //checks if user cancels -> null, stops game.
                console.log("Cancelled");
                return; //'return' is here bc this code is inside playGame(), meaning exit entire playGame() immediately. No more rounds&final results. Without it game continues to run and cause bugs.
            }

            const computerChoice=getComputerChoice();//calls getComputerChoice() & stores in computerChoice

            playRound(humanChoice, computerChoice); //sends both choices into round logic.
            //eg, if humanChoice = "rock" & computerChoice ="scissors" -> playRound("rock", "scissors");
        }

        console.log("==Result=="); 

        if (humanScore > computerScore){
            console.log("You win!");
        } else if (computerScore >humanScore){
            console.log("You lost!");
        } else {
            console.log("Tie!");
        }
        console.log(`Final Score: You: ${humanScore} | Computer: ${computerScore}`);
    }
playGame();
